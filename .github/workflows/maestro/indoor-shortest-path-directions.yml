# Acceptance: shortest-path directions (indoor + outdoor when applicable)


appId: host.exp.exponent
---
- launchApp:
    clearState: true

- tapOn:
    id: continue-guest
- extendedWaitUntil:
    visible:
      id: mapRef
    timeout: 60000

# Hall (H) marker — BuildingCallout
- extendedWaitUntil:
    visible:
      text: "H"
    timeout: 90000
- tapOn:
    text: "H"
- extendedWaitUntil:
    visible:
      id: go-inside
    timeout: 15000

- tapOn:
    id: go-inside

- extendedWaitUntil:
    visible:
      id: search-btn
    timeout: 20000
- tapOn:
    id: search-btn

- scrollUntilVisible:
    element:
      id: generate-directions-btn
    direction: DOWN
    timeout: 10000
    speed: 60
    visibilityPercentage: 50

# From: floor 7, room H-769 (floorplan_H-7.json)
- tapOn:
    id: from-floor
- extendedWaitUntil:
    visible:
      text: "^7$"
    timeout: 8000
- tapOn:
    text: "^7$"

- tapOn:
    id: from-room
- scrollUntilVisible:
    element:
      text: "H-769"
    direction: DOWN
    timeout: 15000
    speed: 70
- tapOn:
    text: "H-769"

# To: floor 8, room H-823 (floorplan_H-8.json)
- tapOn:
    id: to-floor
- extendedWaitUntil:
    visible:
      text: "^8$"
    timeout: 8000
- tapOn:
    text: "^8$"

- tapOn:
    id: to-room
- scrollUntilVisible:
    element:
      text: "H-823"
    direction: DOWN
    timeout: 15000
    speed: 70
- tapOn:
    text: "H-823"

- tapOn:
    id: generate-directions-btn

- extendedWaitUntil:
    visible:
      id: directions-summary-card
    timeout: 120000

- assertVisible:
    id: directions-summary-card
- assertVisible:
    text: "Directions Summary"
- assertVisible:
    text: ".*(Indoor|Outdoor).*"
